spring.application.name=launch-window-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

launch-library.base-url=${LAUNCH_LIBRARY_BASE_URL:https://lldev.thespacedevs.com/2.3.0}
launch-library.page-size=${LAUNCH_LIBRARY_PAGE_SIZE:10}
launch-library.sync.enabled=${LAUNCH_SYNC_ENABLED:false}
launch-library.sync.interval=${LAUNCH_SYNC_INTERVAL:PT30M}
launch-library.sync.initial-delay=${LAUNCH_SYNC_INITIAL_DELAY:PT10S}
launch-library.max-pages=${LAUNCH_LIBRARY_MAX_PAGES:20}
launch-library.max-launches=${LAUNCH_LIBRARY_MAX_LAUNCHES:200}

open-meteo.base-url=${OPEN_METEO_BASE_URL:https://api.open-meteo.com/v1}
open-meteo.forecast-days=${OPEN_METEO_FORECAST_DAYS:16}
open-meteo.sync.enabled=${WEATHER_SYNC_ENABLED:false}
open-meteo.sync.interval=${WEATHER_SYNC_INTERVAL:PT3H}
open-meteo.sync.initial-delay=${WEATHER_SYNC_INITIAL_DELAY:PT30S}

security.jwt.secret=${JWT_SECRET}
security.jwt.issuer=${JWT_ISSUER:launch-window}
security.jwt.expiration=${JWT_EXPIRATION:PT2H}
