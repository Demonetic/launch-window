name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4

        env:
          MYSQL_DATABASE: launch_window
          MYSQL_USER: launch_window_user
          MYSQL_PASSWORD: launch_window_test_password
          MYSQL_ROOT_PASSWORD: launch_window_root_test_password

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: "jdbc:mysql://127.0.0.1:3306/launch_window?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      DB_USERNAME: launch_window_user
      DB_PASSWORD: launch_window_test_password
      JWT_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x mvnw

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw --batch-mode --no-transfer-progress clean test